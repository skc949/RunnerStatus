name: GitHub Self-Hosted Runner Monitor

on:
  workflow_dispatch:
  # schedule:
  #   - cron: '0 */1 * * *'

permissions:
  contents: read

jobs:
  runner-check:
    runs-on: [self-hosted, NextOpsLVM05]

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install dependencies (gh + jq)
        run: |
          sudo apt-get update
          sudo apt-get install -y gh jq

      - name: Authenticate GitHub CLI
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "$GH_TOKEN" | gh auth login --with-token

      - name: Fetch runner status (CSV)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          OWNER="skc949"
          CSV="github_runners.csv"

          echo "Repository,RunnerName,OS,Status,Busy" > $CSV

          # Get repositories
          REPOS=$(gh repo list $OWNER --limit 100 --json nameWithOwner --jq '.[].nameWithOwner')

          for REPO in $REPOS; do
            echo "Checking $REPO"

            RESPONSE=$(gh api -H "Accept: application/vnd.github+json" "/repos/$REPO/actions/runners")

            echo "$RESPONSE" | jq -r '
              .runners[]? |
              "\("'"$REPO"'"),\(.name),\(.os),\(.status),\(.busy)"' >> $CSV
          done

      - name: Send email (Gmail)
        if: always()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.GMAIL_USERNAME }}
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          subject: GitHub Runner Status Report
          to: shyam9270@gmail.com
          from: GitHub Runner Monitor
          body: |
            Please find attached GitHub self-hosted runner status report.
          attachments: github_runners.csv
