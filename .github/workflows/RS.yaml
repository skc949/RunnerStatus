name: Run on Specific Self Hosted Runner

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: [self-hosted, SelfHostedLinuxRunner]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Confirm runner
        run: |
          echo "Running on: $RUNNER_NAME"
          uname -a

      - name: Test
        run: echo "This is running ONLY on SelfHostedLinuxRunner"
